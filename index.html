<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronous Demo</title>
    <script>
        async function loaduserdetails(username)
        {
          try{
               const url=`https://api.github.com/users/${username}`;
               const res=await fetch(url);
               const data=await res.json();
               document.getElementById("para1").innerText=data.login;
               document.getElementById("para1").innerHTML=data.image;
               document.getElementById("para1").style.color="red";
               console.log("response", res.json());
               console.log("response:", res);
          }
          catch(err)
          {
            console.log("Error:", err)
          }
        }
        loaduserdetails("ananyaacoder");
    </script>
</head>
<body>
    <h1>github page info</h1>
    <p id="para1"></p>
    <img src="" alt="">
</body>
</html>
